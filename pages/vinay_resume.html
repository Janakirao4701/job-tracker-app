<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vinay Resume Builder — Pin to Pin Replica</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --head-black: #111111;
    --dark-gray: #2B2B2B;
    --mid-gray: #555555;
    --light-gray: #888888;
    --rule-gray: #AAAAAA;
    --accent: #4f46e5;
    --accent-hover: #4338ca;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    background: #f8fafc;
    font-family: 'Inter', -apple-system, sans-serif;
    color: #1e293b;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ── SIDEBAR / INPUTS ── */
  .sidebar {
    width: 440px;
    background: white;
    border-right: 1px solid #e2e8f0;
    display: flex;
    flex-direction: column;
    padding: 24px;
    overflow-y: auto;
    flex-shrink: 0;
  }

  .sidebar-header {
    margin-bottom: 24px;
  }

  .sidebar-title {
    font-size: 20px;
    font-weight: 800;
    color: var(--head-black);
    letter-spacing: -0.5px;
  }

  .sidebar-sub {
    font-size: 13px;
    color: #64748b;
    margin-top: 4px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }

  .field {
    margin-bottom: 16px;
  }

  .field label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  .input-text, .input-area {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid #e2e8f0;
    border-radius: 8px;
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: all 0.2s;
  }

  .input-text:focus, .input-area:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
  }

  .input-area {
    resize: vertical;
    min-height: 480px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 12px;
    line-height: 1.5;
  }

  .btn-group {
    display: flex;
    gap: 12px;
    margin-top: 20px;
  }

  .btn {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-primary {
    background: var(--accent);
    color: white;
    box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
  }

  .btn-primary:hover {
    background: var(--accent-hover);
    transform: translateY(-1px);
  }

  /* ── PREVIEW PANE ── */
  .preview-pane {
    flex: 1;
    background: #e2e8f0;
    padding: 40px;
    overflow-y: auto;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }

  .resume-page {
    background: white;
    width: 8.5in;
    min-height: 11in;
    padding: 0.55in 0.65in;
    box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    box-sizing: border-box;
    font-family: "Times New Roman", Times, serif;
    color: var(--dark-gray);
    line-height: 1.25;
    font-size: 10pt;
    transform-origin: top center;
  }

  /* ── RESUME STYLES (PIN TO PIN) ── */
  .r-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 4pt;
  }

  .r-header-left { text-align: left; }
  .r-header-right { text-align: right; font-size: 9pt; color: var(--dark-gray); padding-top: 5pt; }

  .r-name {
    font-size: 18pt;
    font-weight: bold;
    color: var(--head-black);
    line-height: 1;
    margin-bottom: 2pt;
  }

  .r-title {
    font-style: italic;
    color: var(--mid-gray);
    font-size: 10.5pt;
  }

  .r-loc {
    font-style: italic;
    color: var(--light-gray);
    font-size: 10pt;
  }

  .r-section { margin-top: 10pt; margin-bottom: 4pt; }
  
  .r-sec-title {
    font-size: 10pt;
    font-weight: bold;
    color: var(--head-black);
    text-transform: uppercase;
    display: flex;
    flex-direction: column;
  }

  .r-sec-title::after {
    content: "";
    display: block;
    height: 0.8pt;
    background: var(--rule-gray);
    margin-top: 1pt;
    margin-bottom: 2pt;
  }

  .r-summary { text-align: justify; margin-bottom: 4pt; }

  .r-skill-line { margin-bottom: 1.5pt; }
  .r-skill-lbl { font-weight: bold; }

  .r-job { margin-top: 5pt; margin-bottom: 4pt; }
  .r-job-head { display: flex; justify-content: space-between; font-weight: bold; color: var(--head-black); font-size: 8.5pt; }
  .r-job-date { font-weight: normal; font-style: italic; color: var(--mid-gray); font-size: 9pt; }
  .r-job-sub { font-weight: bold; color: var(--dark-gray); margin-top: 1pt; margin-bottom: 2pt; font-size: 8.5pt; }
  .r-sep { color: var(--light-gray); margin: 0 4pt; font-weight: normal; }
  .r-job-loc { font-weight: normal; color: var(--mid-gray); font-size: 8.5pt; }

  .r-ul { margin: 2pt 0 4pt 1.25em; padding: 0; list-style-type: "- "; }
  .r-li { margin-bottom: 1.5pt; padding-left: 0.25em; text-align: justify; }

  .r-edu { margin-top: 6pt; margin-bottom: 4pt; font-size: 8.5pt; }
  .r-edu-head { display: flex; justify-content: space-between; font-weight: bold; font-size: 8.5pt; }
  .r-edu-sub { color: var(--mid-gray); margin-top: 1pt; font-size: 8.5pt; }

  .r-key-ach {
    font-weight: bold;
    font-size: 8.5pt;
    color: var(--head-black);
    margin-top: 4pt;
    margin-bottom: 1pt;
    display: block;
  }

  /* Utils */
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-title">Vinay Resume Builder</div>
    <div class="sidebar-sub">Enter details for "Pin to Pin" LaTeX matching.</div>
  </div>

  <div class="form-grid">
    <div class="field" style="grid-column: span 2;">
      <label>Full Name</label>
      <input type="text" id="in-name" class="input-text" placeholder="Venkata Vinay Vamsi Yeddula">
    </div>
    <div class="field">
      <label>Title</label>
      <input type="text" id="in-title" class="input-text" placeholder="Senior Data Engineer">
    </div>
    <div class="field">
      <label>Location</label>
      <input type="text" id="in-loc" class="input-text" placeholder="Address / City">
    </div>
    <div class="field">
      <label>Mobile</label>
      <input type="text" id="in-phone" class="input-text" placeholder="+1 (414) 895-2296">
    </div>
    <div class="field">
      <label>Email</label>
      <input type="text" id="in-email" class="input-text" placeholder="example@gmail.com">
    </div>
    <div class="field" style="grid-column: span 2;">
      <label>LinkedIn (URL or Text)</label>
      <input type="text" id="in-link" class="input-text" placeholder="linkedin.com/in/vinay">
    </div>
  </div>

  <div class="field">
    <label>Resume Content (LaTeX Style Tags)</label>
    <textarea id="in-resume" class="input-area" placeholder="[Professional Summary]
Analyze data...

[Technical Skills]
SQL: T-SQL, Snowflake...

[Professional Experience]
Senior Data Analyst | Prudential Financial | NJ | Dec 2023 - Present
- Analyzed datasets...

[Education]
Master of Science | Concordia University | USA | 2025
"></textarea>
  </div>

  <div class="btn-group">
    <button class="btn btn-primary" id="btn-dl-word">Download .docx</button>
  </div>
</div>

<div class="preview-pane">
  <div class="resume-page" id="resume-preview">
    <!-- HEADER -->
    <div class="r-header">
      <div class="r-header-left">
        <div class="r-name" id="view-name">User Name</div>
        <div class="r-title" id="view-title">Professional Title</div>
        <div class="r-loc" id="view-loc">General Location</div>
      </div>
      <div class="r-header-right">
        <div id="view-phone">Mobile No.</div>
        <div id="view-email">email@example.com</div>
        <div id="view-link">linkedin.com/in/user</div>
      </div>
    </div>

    <!-- SECTIONS -->
    <div id="view-content"></div>
  </div>
</div>

<script src="../scripts/vinay_resume.js"></script>

</body>
</html>
